<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NAZE AR Demo</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background:#000; }
      .hint {
        position: fixed; left: 0; right: 0; bottom: 0;
        padding: 12px 14px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: #fff; background: rgba(0,0,0,.55);
        text-align: center; z-index: 10;
      }
      .top {
        position: fixed; left: 0; right: 0; top: 0;
        padding: 10px 12px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: #fff; background: rgba(0,0,0,.35);
        text-align: center; z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div class="top">NAZE AR Demo</div>
    <div class="hint">カメラ許可 → アクキーを映すと動画が重なって再生されます（iPhoneは最初に一度タップ）</div>

    <a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes;"
  embedded
  transparent
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>
      <a-assets>
        <video
          id="arVideo"
          src="./demo.mp4"
          preload="auto"
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <!-- ここが重要：余計なパラメータなしで mindar-image-camera を付ける -->
      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        mindar-image-camera
      ></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <!-- 9:16想定（縦動画）。必要なら後で詰める -->
        <a-plane
          position="0 0 0.01"
          width="0.5625"
          height="1.0"
          material="shader: flat; src: #arVideo; transparent: true;"
        ></a-plane>
      </a-entity>
    </a-scene>

    <script>
      const videoEl = document.querySelector("#arVideo");
      const targetEl = document.querySelector("#target");

      // iOS: タップで再生権限を解除（ミュートで通しやすくする）
      const unlock = async () => {
        try {
          videoEl.muted = true;
          await videoEl.play();
          videoEl.pause();
          videoEl.currentTime = 0;
        } catch (e) {}
      };
      window.addEventListener("touchend", unlock, { once: true });
      window.addEventListener("click", unlock, { once: true });

      targetEl.addEventListener("targetFound", async () => {
        try {
          videoEl.muted = true; // 音いらないならこれが一番安定
          await videoEl.play();
        } catch (e) {}
      });

      targetEl.addEventListener("targetLost", () => {
        try { videoEl.pause(); } catch (e) {}
      });
    </script>
  </body>
</html>
