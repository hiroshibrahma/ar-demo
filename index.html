<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NAZE AR Demo</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background:#000; }
      .hint {
        position: fixed; left: 0; right: 0; bottom: 0;
        padding: 12px 14px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: #fff; background: rgba(0,0,0,.55);
        text-align: center; z-index: 10;
      }
      .top {
        position: fixed; left: 0; right: 0; top: 0;
        padding: 10px 12px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: #fff; background: rgba(0,0,0,.35);
        text-align: center; z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div class="top">NAZE AR Demo</div>
    <div class="hint">カメラ許可 → アクキーを映すとキャラが飛び出して、そのままアクションが始まります</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes; filterMinCF: 0.001; filterBeta: 0.01;"
      embedded
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      color-space="sRGB"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
    >
      <a-assets>
        <!-- 背景付きアクション動画 -->
        <video
          id="arVideo"
          src="./demo.mp4"
          preload="auto"
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>

        <!-- 飛び出し用：キャラ透過PNG（リポジトリ直下に character.png を置く） -->
        <img id="charImg" src="./character.png" crossorigin="anonymous" />
      </a-assets>

      <a-camera mindar-image-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <!-- 1) 飛び出しキャラ（最初は非表示） -->
        <a-plane
          id="charPlane"
          visible="false"
          position="0 0 0.02"
          width="0.8"
          height="0.8"
          material="shader: flat; src: #charImg; transparent: true; alphaTest: 0.1; opacity: 1;"
        ></a-plane>

        <!-- 2) 背景付き動画（最初は非表示＆透明） -->
        <a-plane
          id="videoPlane"
          visible="false"
          position="0 0 0.01"
          width="0.5625"
          height="1.0"
          material="shader: flat; src: #arVideo; transparent: true; opacity: 0;"
        ></a-plane>
      </a-entity>
    </a-scene>

    <script>
      const videoEl = document.querySelector("#arVideo");
      const targetEl = document.querySelector("#target");
      const charPlane = document.querySelector("#charPlane");
      const videoPlane = document.querySelector("#videoPlane");

      // iOS: ユーザー操作で動画再生権限をアンロック
      const unlock = async () => {
        try {
          videoEl.muted = true;
          await videoEl.play();
          videoEl.pause();
          videoEl.currentTime = 0;
        } catch (e) {}
      };
      window.addEventListener("touchend", unlock, { once: true });
      window.addEventListener("click", unlock, { once: true });

      const resetVisuals = () => {
        // キャラ
        charPlane.setAttribute("visible", "false");
        charPlane.setAttribute("scale", "1 1 1");
        charPlane.setAttribute("position", "0 0 0.02");
        charPlane.setAttribute("material", "opacity: 1;");

        // 動画
        videoPlane.setAttribute("visible", "false");
        videoPlane.setAttribute("material", "opacity: 0;");
      };

      const popCharacterThenStartVideo = async () => {
        // 1) キャラ飛び出し
        charPlane.setAttribute("visible", "true");
        charPlane.setAttribute("scale", "0.01 0.01 0.01");
        charPlane.setAttribute("position", "0 0 0.02");

        // アニメ（スケール＆前に出る）
        charPlane.setAttribute("animation__s1",
          "property: scale; to: 1.2 1.2 1.2; dur: 240; easing: easeOutBack");
        charPlane.setAttribute("animation__p1",
          "property: position; to: 0 0 0.08; dur: 240; easing: easeOutQuad");

        // 少し戻して安定（バウンス）
        setTimeout(() => {
          charPlane.setAttribute("animation__s2",
            "property: scale; to: 1 1 1; dur: 160; easing: easeOutQuad");
          charPlane.setAttribute("animation__p2",
            "property: position; to: 0 0 0.06; dur: 160; easing: easeOutQuad");
        }, 250);

        // 2) 0.6秒後に動画を開始＆フェードイン
        setTimeout(async () => {
          videoPlane.setAttribute("visible", "true");
          try {
            videoEl.muted = true; // 音無しの方が安定
            await videoEl.play();
          } catch (e) {}

          // 動画フェードイン
          videoPlane.setAttribute("animation__vIn",
            "property: material.opacity; to: 1; dur: 220; easing: easeOutQuad");

          // キャラはフェードアウトして消す（動画に切り替わった感）
          charPlane.setAttribute("animation__cOut",
            "property: material.opacity; to: 0; dur: 180; easing: easeOutQuad");

          setTimeout(() => {
            charPlane.setAttribute("visible", "false");
            charPlane.setAttribute("material", "opacity: 1;");
          }, 200);

        }, 600);
      };

      targetEl.addEventListener("targetFound", async () => {
        resetVisuals();
        popCharacterThenStartVideo();
      });

      targetEl.addEventListener("targetLost", () => {
        try { videoEl.pause(); } catch (e) {}
        resetVisuals();
      });

      // 初期化
      resetVisuals();
    </script>
  </body>
</html>
