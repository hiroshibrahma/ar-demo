<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NAZE AR Demo (Three.js)</title>
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
    #container { position:fixed; inset:0; width:100vw; height:100vh; background:#000; }
    #container canvas { position:fixed !important; inset:0 !important; width:100vw !important; height:100vh !important; display:block; }
    .top{ position:fixed; left:0; right:0; top:0; padding:10px 12px; font:16px/1.4 -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial; color:#fff; background:rgba(0,0,0,.35); text-align:center; z-index:10; pointer-events:none;}
    .hint{ position:fixed; left:0; right:0; bottom:0; padding:12px 14px; font:14px/1.4 -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial; color:#fff; background:rgba(0,0,0,.55); text-align:center; z-index:10;}
    .tap{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); padding:12px 14px; font:14px/1.4 -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial; color:#fff; background:rgba(0,0,0,.6); border-radius:10px; z-index:20; user-select:none;}
    .hidden{ display:none; }
  </style>
</head>

<body>
  <div class="top">NAZE AR Demo</div>
  <div class="hint">カメラ許可 → アクキーを映すと「ポン」→動画開始（最初に一度タップ）</div>
  <div id="tap" class="tap">画面を1回タップして開始</div>
  <div id="container"></div>

  <!-- Three.js (r150: MindAR相性対策) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <!-- MindAR three -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <script>
    const container = document.querySelector("#container");
    const tap = document.querySelector("#tap");

    const log = (...args) => { console.log("[AR]", ...args); };
    const fatal = (err) => {
      console.error(err);
      const msg = (err && (err.stack || err.message)) ? (err.stack || err.message) : String(err);
      alert("AR初期化に失敗: \n\n" + msg);
    };

    // Assets
    const video = document.createElement("video");
    video.src = "./demo.mp4";
    video.loop = true;
    video.muted = true;
    video.playsInline = true;
    video.setAttribute("playsinline", "");
    video.setAttribute("webkit-playsinline", "");
    video.preload = "auto";
    video.crossOrigin = "anonymous";

    const charImg = new Image();
    charImg.src = "./character.png";
    charImg.crossOrigin = "anonymous";

    const waitImage = (img) => new Promise((res, rej) => {
      if (img.complete && img.naturalWidth > 0) return res();
      img.onload = () => res();
      img.onerror = (e) => rej(new Error("Failed to load image: character.png"));
    });

    const waitVideoMeta = (v) => new Promise((res, rej) => {
      if (v.readyState >= 1) return res();
      v.onloadedmetadata = () => res();
      v.onerror = () => rej(new Error("Failed to load video metadata: demo.mp4"));
    });

    async function main() {
      log("THREE version:", (window.THREE && THREE.REVISION) || "missing");
      log("MindAR global:", window.MINDAR ? "OK" : "MISSING");

      if (!window.MINDAR || !window.MINDAR.IMAGE || !window.MINDAR.IMAGE.MindARThree) {
        throw new Error("MindAR (mindar-image-three) not loaded. window.MINDAR.IMAGE.MindARThree is missing.");
      }

      // Ensure assets are loaded
      await Promise.all([waitImage(charImg), waitVideoMeta(video)]);
      log("Assets loaded");

      // Optional: check targets.mind fetch early (404検出)
      const mindUrl = "./targets.mind";
      const r = await fetch(mindUrl, { cache: "no-store" });
      if (!r.ok) throw new Error(`targets.mind fetch failed: ${r.status} ${r.statusText} (check file path/case)`);
      log("targets.mind fetch OK");

      const { MindARThree } = window.MINDAR.IMAGE;

      const mindarThree = new MindARThree({
        container,
        imageTargetSrc: "./targets.mind",
        uiLoading: "yes",
        uiScanning: "yes",
        filterMinCF: 0.001,
        filterBeta: 0.01
      });

      const { renderer, scene, camera } = mindarThree;

      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const anchor = mindarThree.addAnchor(0);

      // Textures
      const charTex = new THREE.Texture(charImg);
      charTex.needsUpdate = true;

      const charMat = new THREE.MeshBasicMaterial({ map: charTex, transparent: true, depthWrite: false, opacity: 1 });
      const charMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), charMat);
      charMesh.visible = false;
      charMesh.position.set(0, 0, 0.02);
      anchor.group.add(charMesh);

      const videoTex = new THREE.VideoTexture(video);
      videoTex.minFilter = THREE.LinearFilter;
      videoTex.magFilter = THREE.LinearFilter;
      videoTex.generateMipmaps = false;

      const videoMat = new THREE.MeshBasicMaterial({ map: videoTex, transparent: true, opacity: 0, depthWrite: false });
      const videoMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.5625, 1.0), videoMat);
      videoMesh.visible = false;
      videoMesh.position.set(0, 0, 0.01);
      anchor.group.add(videoMesh);

      function reset() {
        charMesh.visible = false;
        charMesh.scale.set(1,1,1);
        charMesh.position.set(0,0,0.02);
        charMat.opacity = 1;

        videoMesh.visible = false;
        videoMat.opacity = 0;
      }

      function startSequence() {
        reset();
        charMesh.visible = true;
        charMesh.scale.set(0.01,0.01,0.01);

        const t0 = performance.now();
        const tick = () => {
          const t = (performance.now() - t0) / 1000;

          // pop
          if (t < 0.24) {
            const k = t / 0.24;
            const s = 0.01 + (1.2 - 0.01) * k;
            charMesh.scale.set(s,s,s);
            charMesh.position.z = 0.02 + (0.08 - 0.02) * k;
          } else if (t < 0.41) {
            const k = (t - 0.24) / 0.17;
            const s = 1.2 + (1.0 - 1.2) * k;
            charMesh.scale.set(s,s,s);
            charMesh.position.z = 0.08 + (0.06 - 0.08) * k;
          }

          // video in
          if (t > 0.60 && !videoMesh.visible) {
            videoMesh.visible = true;
            video.play().catch(()=>{});
          }
          if (videoMesh.visible) {
            const k = Math.min(1, (t - 0.60) / 0.45);
            videoMat.opacity = k;
            const kc = Math.min(1, (t - 0.60) / 0.25);
            charMat.opacity = 1 - kc;
            if (kc >= 1) { charMesh.visible = false; charMat.opacity = 1; }
          }

          if (t < 1.2) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

      anchor.onTargetFound = () => { log("targetFound"); startSequence(); };
      anchor.onTargetLost  = () => { log("targetLost"); video.pause(); reset(); };

      log("Starting MindAR camera...");
      await mindarThree.start();
      log("MindAR started OK");

      renderer.setAnimationLoop(() => renderer.render(scene, camera));

      window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    async function boot() {
      tap.classList.add("hidden");
      try {
        // unlock video playback
        await video.play();
        video.pause();
        video.currentTime = 0;
      } catch (e) {
        log("video unlock failed (ok on iOS):", e);
      }

      try {
        await main();
      } catch (err) {
        fatal(err);
      }
    }

    window.addEventListener("click", boot, { once: true });
    window.addEventListener("touchend", boot, { once: true });
  </script>
</body>
</html>
