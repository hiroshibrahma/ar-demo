<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NAZE AR Demo</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html,body{
margin:0;
overflow:hidden;
background:#000;
}

.top{
position:fixed;
top:0;
left:0;
right:0;
color:#fff;
padding:10px;
text-align:center;
background:rgba(0,0,0,.4);
z-index:10;
}

.hint{
position:fixed;
bottom:0;
left:0;
right:0;
color:#fff;
padding:10px;
text-align:center;
background:rgba(0,0,0,.5);
z-index:10;
}
</style>
</head>

<body>

<div class="top">NAZE AR Demo</div>
<div class="hint">アクキーを映すとキャラが飛び出します</div>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:true"
renderer="colorManagement:true; physicallyCorrectLights:true"
>

<a-assets>

<video
id="arVideo"
src="./demo.mp4"
loop
preload="auto"
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

<img id="charImg" src="./character.png">

</a-assets>

<a-camera mindar-image-camera position="0 0 0"></a-camera>

<a-entity id="target" mindar-image-target="targetIndex:0">

<!-- キャラ -->
<a-plane
id="charPlane"
visible="false"
position="0 0 0.02"
width="0.8"
height="0.8"
material="shader:flat; src:#charImg; transparent:true">
</a-plane>

<!-- 動画 -->
<a-plane
id="videoPlane"
visible="false"
position="0 0 0.01"
width="0.5625"
height="1"
material="shader:flat; src:#arVideo; transparent:true; opacity:0">
</a-plane>

<!-- スパークル -->
<a-entity id="sparkles" visible="false" position="0 0 0.08">

<a-plane class="sp" position="0 0 0" width="0.06" height="0.06" material="shader:flat; color:#fff; transparent:true; opacity:0"></a-plane>

<a-plane class="sp" position="0.08 0.02 0" width="0.05" height="0.05" material="shader:flat; color:#fff; transparent:true; opacity:0"></a-plane>

<a-plane class="sp" position="-0.08 0.02 0" width="0.05" height="0.05" material="shader:flat; color:#fff; transparent:true; opacity:0"></a-plane>

<a-plane class="sp" position="0.05 0.1 0" width="0.05" height="0.05" material="shader:flat; color:#fff; transparent:true; opacity:0"></a-plane>

<a-plane class="sp" position="-0.05 -0.1 0" width="0.05" height="0.05" material="shader:flat; color:#fff; transparent:true; opacity:0"></a-plane>

<a-plane class="sp" position="0.1 -0.05 0" width="0.05" height="0.05" material="shader:flat; color:#fff; transparent:true; opacity:0"></a-plane>

<a-plane class="sp" position="-0.1 -0.05 0" width="0.05" height="0.05" material="shader:flat; color:#fff; transparent:true; opacity:0"></a-plane>

<a-plane class="sp" position="0 0.12 0" width="0.05" height="0.05" material="shader:flat; color:#fff; transparent:true; opacity:0"></a-plane>

</a-entity>

</a-entity>

</a-scene>

<script>

const videoEl = document.querySelector("#arVideo")
const target = document.querySelector("#target")
const charPlane = document.querySelector("#charPlane")
const videoPlane = document.querySelector("#videoPlane")
const sparkles = document.querySelector("#sparkles")

function resetVisuals(){

charPlane.setAttribute("visible",false)

videoPlane.setAttribute("visible",false)
videoPlane.setAttribute("material","opacity:0")

sparkles.setAttribute("visible",false)

}

function playSparkles(){

const sps = sparkles.querySelectorAll(".sp")

sparkles.setAttribute("visible",true)

sps.forEach((el,i)=>{

setTimeout(()=>{

el.setAttribute("animation__fadein",
"property:material.opacity;to:1;dur:100")

el.setAttribute("animation__fadeout",
"property:material.opacity;to:0;delay:120;dur:200")

el.setAttribute("animation__scale",
"property:scale;to:1.5 1.5 1.5;dur:200")

},i*20)

})

setTimeout(()=>{
sparkles.setAttribute("visible",false)
},500)

}

function startExperience(){

playSparkles()

charPlane.setAttribute("visible",true)
charPlane.setAttribute("scale","0.01 0.01 0.01")

charPlane.setAttribute("animation__scale",
"property:scale;to:1 1 1;dur:300;easing:easeOutBack")

setTimeout(()=>{

videoPlane.setAttribute("visible",true)

videoPlane.setAttribute("animation__fade",
"property:material.opacity;to:1;dur:450")

videoEl.muted=true
videoEl.play()

charPlane.setAttribute("animation__fade",
"property:material.opacity;to:0;dur:300")

},600)

}

target.addEventListener("targetFound",()=>{

resetVisuals()

startExperience()

})

target.addEventListener("targetLost",()=>{

videoEl.pause()

resetVisuals()

})

</script>

</body>
</html>
