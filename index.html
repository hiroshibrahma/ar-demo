<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>NAZE AR Demo</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { margin:0; padding:0; height:100vh; height:100dvh; overflow:hidden; background:#000; }
    body { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
    #ar-container { position:fixed; inset:0; width:100%; height:100%; overflow:hidden; background:#000; }
    #ar-container video {
      position:fixed !important; top:0 !important; left:0 !important;
      width:100% !important; height:100% !important;
      object-fit:cover !important; z-index:0 !important;
    }
    #ar-container canvas {
      position:fixed !important; top:0 !important; left:0 !important;
      width:100% !important; height:100% !important; z-index:1 !important;
    }
    .ui-top {
      position:fixed; left:0; right:0; top:0;
      padding:max(10px,env(safe-area-inset-top)) 12px 10px;
      font:600 15px/1.4 -apple-system,sans-serif;
      color:#fff; background:rgba(0,0,0,.4);
      text-align:center; z-index:20; pointer-events:none;
    }
    .ui-bottom {
      position:fixed; left:0; right:0; bottom:0;
      padding:12px 14px max(12px,env(safe-area-inset-bottom));
      font:13px/1.4 -apple-system,sans-serif;
      color:rgba(255,255,255,.8); background:rgba(0,0,0,.5);
      text-align:center; z-index:20; pointer-events:none;
    }
    #tap-overlay {
      position:fixed; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
      background:rgba(0,0,0,.75); z-index:30;
    }
    #tap-btn {
      padding:16px 28px;
      font:600 16px/1 -apple-system,sans-serif;
      color:#fff; background:rgba(255,255,255,.15);
      border:1.5px solid rgba(255,255,255,.5); border-radius:12px;
      cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
      transition:opacity .2s;
    }
    #tap-btn:disabled { opacity:0.35; cursor:default; }
    #lib-status { font:13px/1.4 -apple-system,sans-serif; color:rgba(255,255,255,.55); }
    #status-msg {
      position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
      padding:10px 16px; font:14px/1.4 -apple-system,sans-serif;
      color:#fff; background:rgba(0,0,0,.65); border-radius:8px;
      z-index:20; pointer-events:none; white-space:pre-wrap; text-align:center; max-width:88vw;
    }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <div id="ar-container"></div>
  <div class="ui-top">NAZE AR Demo</div>
  <div class="ui-bottom">アクリルキーホルダーをカメラに向けてください</div>
  <div id="status-msg" class="hidden"></div>
  <div id="tap-overlay">
    <div id="lib-status">読み込み中…</div>
    <button id="tap-btn" disabled>しばらくお待ちください</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { MindARThree } from 'mindar-image-three';

    const $ = (s) => document.querySelector(s);
    const log = (...a) => console.log('[AR]', ...a);
    const err = (...a) => console.error('[AR]', ...a);

    const tapBtn    = $('#tap-btn');
    const libStatus = $('#lib-status');

    const setStatus = (msg) => {
      const el = $('#status-msg');
      if (!el) return;
      el.textContent = msg;
      el.classList.remove('hidden');
      log(msg);
    };
    const hideStatus = () => $('#status-msg')?.classList.add('hidden');
    const fatalAlert = (where, e) => {
      const msg = '[' + where + ']\n' + (e?.message ?? String(e));
      err(msg, e);
      setStatus('❌ ' + msg);
    };

    const VIDEO_SRCS = ['./demo.mp4', './demo2.mp4', './demo3.mp4'];
    const videos = VIDEO_SRCS.map(src => {
      const v = Object.assign(document.createElement('video'), {
        src, loop: true, muted: true, playsInline: true, preload: 'auto',
      });
      v.setAttribute('playsinline', '');
      v.setAttribute('webkit-playsinline', '');
      return v;
    });

    const waitVid = (v) => new Promise((res) => {
      if (v.readyState >= 1) return res();
      v.onloadedmetadata = res;
      v.onerror = res;
    });

    let _renderer = null;
    const applySize = () => {
      if (_renderer) _renderer.setSize(window.innerWidth, window.innerHeight, false);
    };
    window.addEventListener('resize', applySize);
    window.addEventListener('orientationchange', () => setTimeout(applySize, 300));

    log('THREE r' + THREE.REVISION);
    libStatus.textContent = '準備完了！';
    tapBtn.textContent = 'タップして AR を開始';
    tapBtn.disabled = false;

    async function main() {
      setStatus('動画読み込み中…');
      await Promise.all(videos.map(waitVid));
      log('all videos ready');

      setStatus('MindAR 初期化中…');
      const mindarThree = new MindARThree({
        container: $('#ar-container'),
        imageTargetSrc: './targets.mind',
        uiLoading: 'yes', uiScanning: 'yes', uiError: 'yes',
        filterMinCF: 0.001, filterBeta: 0.001,
        warmupTolerance: 5, missTolerance: 5,
      });

      const { renderer, scene, camera } = mindarThree;
      _renderer = renderer;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight, false);

      // 現在アクティブなトリガーのindex（-1=なし）
      let activeIndex = -1;

      const anchors = videos.map((video, i) => {
        const anchor = mindarThree.addAnchor(i);

        const videoTex = new THREE.VideoTexture(video);
        videoTex.minFilter = THREE.LinearFilter;
        videoTex.magFilter = THREE.LinearFilter;
        videoTex.generateMipmaps = false;

        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(1.8, 1.8),
          new THREE.MeshBasicMaterial({ map: videoTex, transparent: true, opacity: 0, depthWrite: false, side: THREE.DoubleSide })
        );
        mesh.visible = false;
        mesh.position.set(0, 0, 0.01);
        anchor.group.add(mesh);

        let fading = false;
        let opacity = 0;

        anchor.onTargetFound = () => {
          // 他のトリガーがすでにアクティブなら無視
          if (activeIndex !== -1 && activeIndex !== i) {
            log('target' + i + ' ignored (target' + activeIndex + ' is active)');
            return;
          }
          activeIndex = i;
          log('✅ target' + i + ' found');
          setStatus('認識！');
          setTimeout(hideStatus, 1500);
          video.play().catch(e => err('play' + i + ':', e));
          mesh.visible = true;
          fading = true;
          opacity = 0;
          mesh.material.opacity = 0;
        };

        anchor.onTargetLost = () => {
          // 自分がアクティブだった場合だけ解放
          if (activeIndex !== i) return;
          activeIndex = -1;
          log('❌ target' + i + ' lost');
          video.pause();
          video.currentTime = 0;
          mesh.visible = false;
          mesh.material.opacity = 0;
          fading = false;
          opacity = 0;
        };

        return {
          mesh,
          get fading() { return fading; },
          set fading(v) { fading = v; },
          get opacity() { return opacity; },
          set opacity(v) { opacity = v; },
        };
      });

      setStatus('カメラ起動中…（許可ダイアログが出たら「許可」を選んでください）');
      await mindarThree.start();
      log('started');

      applySize();
      setTimeout(applySize, 500);
      setTimeout(applySize, 1500);

      setStatus('スキャン中…アクリルキーホルダーを映してください');

      renderer.setAnimationLoop(() => {
        anchors.forEach(a => {
          if (a.fading) {
            a.opacity += (1 - a.opacity) * 0.05;
            a.mesh.material.opacity = a.opacity;
            if (a.opacity > 0.98) { a.mesh.material.opacity = 1; a.fading = false; }
          }
        });
        renderer.render(scene, camera);
      });
    }

    let booted = false;
    async function boot() {
      if (booted) return; booted = true;
      $('#tap-overlay').classList.add('hidden');
      for (const v of videos) {
        try { await v.play(); v.pause(); v.currentTime = 0; } catch(e) {}
      }
      try { await main(); } catch(e) { fatalAlert('main()', e); }
    }

    tapBtn.addEventListener('click', boot, { once: true });
    tapBtn.addEventListener('touchend', (e) => { e.preventDefault(); boot(); }, { once: true });
  </script>
</body>
</html>
