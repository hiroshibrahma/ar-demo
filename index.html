<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NAZE AR Demo</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- MindAR (A-Frame) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background:#000; }
      .hint {
        position: fixed; left: 0; right: 0; bottom: 0;
        padding: 12px 14px;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: #fff; background: rgba(0,0,0,.55);
        text-align: center;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <div class="hint">カメラ許可 → キーホルダーを映すと動画が重なって再生されます</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
    >
      <a-assets>
        <video
          id="arVideo"
          src="./demo.mp4"
          preload="auto"
          loop
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#arVideo"
          position="0 0 0.01"
          width="1.0"
          height="0.5625"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      // iOSの自動再生対策：最初のタップ後に再生を試みる
      const v = document.querySelector("#arVideo");
      const sceneEl = document.querySelector("a-scene");

      sceneEl.addEventListener("loaded", () => {
        const tryPlay = async () => {
          try { await v.play(); } catch (e) {}
          window.removeEventListener("touchend", tryPlay);
          window.removeEventListener("click", tryPlay);
        };
        window.addEventListener("touchend", tryPlay, { once: true });
        window.addEventListener("click", tryPlay, { once: true });
      });
    </script>
  </body>
</html>
